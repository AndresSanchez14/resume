<div class="hero-section">
  <div class="terminal-window">

    <div class="terminal-header">
      <div class="window-buttons">
        <span class="btn close"></span>
        <span class="btn minimize"></span>
        <span class="btn maximize"></span>
      </div>
      <span class="window-title">~/andres/perfil.sh</span>
    </div>

    <div class="terminal-body">
      <p class="command"><span class="prompt">andres&#64;dev:~$</span> whoami</p>

      <div class="identity">
        <img class="avatar" src="assets/photoProfile.png" alt="Foto de perfil de Andrés Sánchez" width="88" height="88">
        <div>
          <h1 class="name">{{ dataToFillShortResume.name}}</h1>
          <h2 class="role">{{ dataToFillShortResume.role }}</h2>
        </div>
      </div>

      <p class="command mt-2"><span class="prompt">andres&#64;dev:~$</span> cat description.txt</p>
      <p class="description">
        {{ dataToFillShortResume.description }}
      </p>

      <div class="terminal-actions">
        <button type="button" class="btn-primary" (click)="downloadCV()">
          <span class="function">{{dataToFillShortResume.buttons.downloadCVText}}</span><span class="brackets">()</span>
        </button>
        <a href="javascript:void(0)" class="btn-secondary" (click)="scrollToContact($event)">
          <span class="function">{{dataToFillShortResume.buttons.sendEmailText}}</span><span class="brackets">()</span>
        </a>
      </div>
    </div>

  </div>
</div>
