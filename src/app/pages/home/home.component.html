<div class="main-container">

  <!-- START HEADER -->
  <div class="header">
    <mat-toolbar class="navbar">

      <div class="logo">
        <a href="/">Andres.dev</a>
      </div>

      <nav class="nav-links">
        <a href="javascript:void(0)" (click)="scrollToSection($event, 'aboutMe')">{{ dataToFillResume.navMenu.aboutMe
          }}</a>
        <a href="javascript:void(0)" (click)="scrollToSection($event, 'education')">{{
          dataToFillResume.navMenu.education }}</a>
        <a href="javascript:void(0)" (click)="scrollToSection($event, 'skills')">{{ dataToFillResume.navMenu.skills
          }}</a>
        <a href="javascript:void(0)" (click)="scrollToSection($event, 'experience')">{{
          dataToFillResume.navMenu.experience }}</a>
        <a href="javascript:void(0)" (click)="scrollToSection($event, 'projects')">{{ dataToFillResume.navMenu.projects
          }}</a>
        <a href="javascript:void(0)" (click)="scrollToSection($event, 'contact')">{{ dataToFillResume.navMenu.contact
          }}</a>
      </nav>

      <div class="actions">

        <mat-button-toggle-group class="language-toggle" value="spanish" [hideSingleSelectionIndicator]="true"
          (change)="onChangueLenguageSelected($event)">

          <mat-button-toggle value="spanish">
            <span>ES</span>
          </mat-button-toggle>

          <mat-button-toggle value="english">
            <span>EN</span>
          </mat-button-toggle>

        </mat-button-toggle-group>

        <button class="theme-toggle-btn" (click)="toggleTheme()" type="button">
          <mat-icon class="theme-icon">
            {{ darkMode ? 'light_mode' : 'dark_mode' }}
          </mat-icon>
        </button>

      </div>

    </mat-toolbar>
  </div>
  <!-- END HEADER -->

  <div class="home-container">
    <!-- START SHORT INTRODUCTION -->
    <section id="aboutMe" class="scroll-section">
      <app-short-resume [dataToFillShortResume]="dataToFillResume.shortIntroduction">
      </app-short-resume>
    </section>
    <!--END SHORT INTRODUCTION -->


    <!-- START CONTACT INFO -->
    <section id="contact" class="scroll-section">
      <app-contact [dataToFillContactInfo]="dataToFillResume.contactInfo" class="contact-section">
      </app-contact>
    </section>

    <!-- END CONTACT INFO -->

    <div class="education-skills-container">

      <!-- START EDUCATION INFO -->

      <section id="education" class="scroll-section">
        <app-education style="height: 512px;" [dataToFillEducationInfo]="dataToFillResume.educationInfo">
        </app-education>
      </section>
      <!-- END EDUCATION INFO -->

      <!-- START SKILLS INFO -->
      <section id="skills" class="scroll-section">
        <app-skills [dataToFillSkillsInfo]="dataToFillResume.skillsInfo" class="skills-section">
        </app-skills>
      </section>
      <!-- END SKILLS INFO -->

    </div>
    <!-- START WORK EXPERIENCE INFO -->
    <section id="experience" class="scroll-section">
      <app-work-experience [dataToFillWorkExperienceInfo]="dataToFillResume.workExperienceInfo"
        class="experience-section">
      </app-work-experience>
    </section>
    <!-- END WORK EXPERIENCE INFO -->
  </div>
</div>
